<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端适配：Android + iOS 通用 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <!-- iOS Safari 全屏模式 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Android Chrome 主题色 -->
  <meta name="theme-color" content="#1a1a2e">
  <!-- ⚡ 禁止浏览器缓存 — 确保每次扫码都拉取最新版本 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>照片画廊</title>
  <style>
    /* ========================================
       全局重置 & 移动端基础
       ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-overflow-scrolling: touch;
      overflow-x: hidden;
      height: 100dvh;
    }

    body {
      font-family:
        -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "SF Pro Display",
        "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", "WenQuanYi Micro Hei",
        Roboto, "Noto Sans SC",
        sans-serif;
      background-color: #0f0f1a;
      color: #e8e8ec;
      line-height: 1.6;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ========================================
       加载遮罩
       ======================================== */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ff6b6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-top: 16px;
      letter-spacing: 0.5px;
    }

    .loading-retry {
      display: none;
      margin-top: 20px;
      padding: 10px 28px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
    }

    .loading-retry:active {
      opacity: 0.8;
    }

    .loading-hint {
      display: none;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      line-height: 1.8;
    }

    /* 超时状态 */
    .loading-overlay.timeout .loading-spinner {
      display: none;
    }
    .loading-overlay.timeout .loading-text {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
    }
    .loading-overlay.timeout .loading-retry {
      display: block;
    }
    .loading-overlay.timeout .loading-hint {
      display: block;
    }

    /* ========================================
       顶部导航栏
       ======================================== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 15, 26, 0.85);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      padding: 12px 20px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      text-align: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #ffffff;
    }

    .header-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    .header-badge {
      display: inline-block;
      background: #ff6b6b;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 10px;
      margin-left: 6px;
      animation: badgePulse 2s ease-in-out;
    }

    @keyframes badgePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ========================================
       主画廊容器
       ======================================== */
    .gallery {
      max-width: 600px;
      margin: 0 auto;
      padding: 8px 0;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }

    /* ========================================
       人物卡片
       ======================================== */
    .card {
      margin: 0 auto 24px;
      width: calc(100% - 24px);
      max-width: 600px;
      background: #1a1a2e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:active {
      transform: scale(0.98);
    }

    .card.highlight {
      animation: cardHighlight 1.2s ease-in-out 3;
      box-shadow: 0 0 0 3px #ff6b6b, 0 8px 40px rgba(255, 107, 107, 0.35);
    }

    @keyframes cardHighlight {
      0%, 100% {
        box-shadow: 0 0 0 3px #ff6b6b, 0 8px 40px rgba(255, 107, 107, 0.35);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.5), 0 12px 50px rgba(255, 107, 107, 0.55);
      }
    }

    /* ========================================
       照片区域
       ======================================== */
    .card-photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #16213e;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-photo-placeholder {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card-photo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s ease;
      background: #16213e;
    }

    .card-photo.loaded {
      opacity: 1;
    }

    /* 扫到的人物标签 */
    .card-scanned-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ff6b6b;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 12px;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(-8px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card.scanned .card-scanned-tag {
      opacity: 1;
      transform: translateY(0);
    }

    /* ========================================
       卡片信息区
       ======================================== */
    .card-info {
      padding: 16px;
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 10px;
      min-height: 20px;
    }

    .card-desc:empty::after {
      content: "这个人很懒，什么都没写";
      color: rgba(255,255,255,0.2);
      font-style: italic;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .card-tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.3px;
    }

    .card-tag:empty {
      display: none;
    }

    /* ========================================
       底部滚动提示
       ======================================== */
    .scroll-hint {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .scroll-hint::after {
      content: "";
      display: block;
      width: 1px;
      height: 30px;
      background: rgba(255,255,255,0.1);
      margin: 10px auto 0;
    }

    /* ========================================
       刷新提示条
       ======================================== */
    .refresh-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: #ff6b6b;
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-bar.show {
      transform: translateY(0);
    }

    .refresh-bar:active {
      opacity: 0.9;
    }

    /* ========================================
       PC 端微调
       ======================================== */
    @media (min-width: 640px) {
      .gallery {
        padding: 16px 0;
        padding-bottom: 40px;
      }
      .card {
        border-radius: 20px;
      }
      .header {
        padding: 16px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- ==================== 加载遮罩 ==================== -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">正在加载…</div>
    <button class="loading-retry" id="loadingRetry" onclick="location.reload(true)">🔄 点此刷新重试</button>
    <div class="loading-hint">
      如持续加载失败<br>请尝试用系统浏览器打开链接<br>或检查网络后下拉刷新
    </div>
  </div>

  <!-- ==================== 页面内容 ==================== -->
  <header class="header">
    <div class="header-title" id="headerTitle">📷 照片画廊</div>
    <div class="header-subtitle" id="headerSubtitle"></div>
  </header>

  <main class="gallery" id="gallery">
    <!-- JS 动态渲染 -->
  </main>

  <div class="scroll-hint">继续滑动探索更多</div>

  <!-- 刷新提示条（内容更新提示） -->
  <div class="refresh-bar" id="refreshBar" onclick="location.reload(true)">
    🔄 内容已更新，点此刷新查看最新
  </div>

  <!-- ==================== 脚本 ==================== -->
  <script>
  // ⚡ 构建版本号 — 每次更新 data.js 后 +1
  //    这个数字确保所有浏览器忽略缓存，加载最新数据
  window.__BUILD__ = 7;
  </script>

  <script>
  (function() {
    // =============================================
    //  0. 加载状态管理
    // =============================================
    var TIMEOUT_MS = 8000;       // 8 秒超时
    var RETRY_COUNT = 0;
    var MAX_RETRY = 2;

    var overlay = document.getElementById('loadingOverlay');
    var loadingText = document.getElementById('loadingText');
    var timeoutTimer = null;

    function showLoading(msg) {
      overlay.classList.remove('hidden', 'timeout');
      loadingText.textContent = msg || '正在加载…';
    }

    function hideLoading() {
      if (timeoutTimer) clearTimeout(timeoutTimer);
      overlay.classList.add('hidden');
    }

    function showTimeout() {
      overlay.classList.add('timeout');
      loadingText.textContent = '⚠️ 网络较慢，请稍候';
    }

    // =============================================
    //  1. 动态加载 data.js（带版本号，强制破缓存）
    // =============================================
    function loadDataScript(callback) {
      var build = window.__BUILD__ || Date.now();
      var script = document.createElement('script');
      script.src = 'data.js?v=' + build;
      script.async = true;

      script.onload = function() {
        if (timeoutTimer) clearTimeout(timeoutTimer);

        // 版本校验：data.js 里的版本号必须和 index.html 一致
        if (window.__DATA_VERSION__ && window.__DATA_VERSION__ !== window.__BUILD__) {
          // 版本不一致 → 浏览器缓存了旧的 data.js → 强制刷新
          console.warn('[画廊] 版本不匹配: data=' + window.__DATA_VERSION__ + ' html=' + window.__BUILD__ + ' → 强制刷新');
          location.reload(true);
          return;
        }

        if (typeof PEOPLE_DATA === 'undefined') {
          showLoadError('数据加载失败');
          return;
        }

        callback();
      };

      script.onerror = function() {
        if (timeoutTimer) clearTimeout(timeoutTimer);

        RETRY_COUNT++;
        if (RETRY_COUNT <= MAX_RETRY) {
          // 自动重试
          showLoading('正在重试 (' + RETRY_COUNT + '/' + MAX_RETRY + ')…');
          var retryScript = document.createElement('script');
          // 重试时加随机参数，绕过任何中间缓存
          retryScript.src = 'data.js?v=' + build + '&r=' + Date.now();
          retryScript.async = true;
          retryScript.onload = script.onload;
          retryScript.onerror = script.onerror;
          document.head.appendChild(retryScript);
        } else {
          showTimeout();
        }
      };

      // 启动超时计时器
      timeoutTimer = setTimeout(function() {
        if (typeof PEOPLE_DATA === 'undefined') {
          showTimeout();
        }
      }, TIMEOUT_MS);

      document.head.appendChild(script);
    }

    function showLoadError(msg) {
      overlay.classList.add('timeout');
      loadingText.textContent = '⚠️ ' + msg;
    }

    // =============================================
    //  2. 读取 URL 参数
    // =============================================
    function getPersonIdFromURL() {
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('person'), 10);
      return isNaN(id) ? null : id;
    }

    // =============================================
    //  3. Canvas 生成占位图（照片缺失时用）
    // =============================================
    function generatePlaceholder(person) {
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');

      var hue = (person.id * 137.5) % 360;
      var bgColor = 'hsl(' + hue + ',45%,18%)';
      var accentColor = 'hsl(' + hue + ',65%,55%)';
      var textColor = 'hsl(' + hue + ',30%,85%)';

      var w = 800;
      var h = 1000;
      canvas.width = w;
      canvas.height = h;

      // 背景
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, w, h);

      // 装饰圆
      ctx.fillStyle = 'hsla(' + hue + ',50%,25%,0.4)';
      ctx.beginPath();
      ctx.arc(w * 0.5, h * 0.35, w * 0.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'hsla(' + hue + ',50%,22%,0.3)';
      ctx.beginPath();
      ctx.arc(w * 0.5, h * 0.35, w * 0.25, 0, Math.PI * 2);
      ctx.fill();

      // 人物轮廓简笔画
      ctx.fillStyle = accentColor;
      ctx.beginPath();
      ctx.arc(w * 0.5, h * 0.28, w * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(w * 0.5, h * 0.55, w * 0.18, h * 0.18, 0, Math.PI, 0);
      ctx.fill();

      // 名字首字
      var firstName = person.name.charAt(0);
      ctx.fillStyle = textColor;
      ctx.font = 'bold 72px -apple-system, "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(firstName, w * 0.5, h * 0.78);

      // 底部装饰线
      ctx.fillStyle = accentColor;
      ctx.fillRect(w * 0.35, h * 0.88, w * 0.3, 4);
      ctx.fillStyle = 'hsla(' + hue + ',65%,55%,0.4)';
      ctx.fillRect(w * 0.38, h * 0.90, w * 0.24, 2);

      return canvas;
    }

    // =============================================
    //  4. 渲染所有人物卡片
    // =============================================
    function renderGallery(data, targetId) {
      var gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      document.getElementById('headerSubtitle').textContent =
        '共 ' + data.length + ' 人';

      var scannedPerson = null;
      for (var i = 0; i < data.length; i++) {
        if (data[i].id === targetId) {
          scannedPerson = data[i];
          break;
        }
      }

      if (scannedPerson) {
        document.getElementById('headerTitle').innerHTML =
          '📷 照片画廊 <span class="header-badge">扫到了' + scannedPerson.name + '</span>';
      }

      data.forEach(function(person) {
        var card = document.createElement('div');
        card.className = 'card';
        card.id = 'person-' + person.id;
        if (person.id === targetId) {
          card.classList.add('scanned');
        }

        // 照片区域
        var photoWrap = document.createElement('div');
        photoWrap.className = 'card-photo-wrap';

        // Canvas 占位图
        var placeholder = generatePlaceholder(person);
        placeholder.className = 'card-photo-placeholder';
        photoWrap.appendChild(placeholder);

        // 加载真实照片（如果路径不为空）
        if (person.photo && person.photo.trim() !== '') {
          var img = new Image();
          img.className = 'card-photo';
          img.alt = person.name;
          img.loading = 'lazy';
          img.decoding = 'async';

          var retries = 0;
          img.onload = function() {
            img.classList.add('loaded');
          };

          img.onerror = function() {
            retries++;
            if (retries <= 1) {
              // 重试一次，加随机参数破缓存
              setTimeout(function() {
                img.src = person.photo + '?r=' + Date.now();
              }, 1500);
            } else {
              img.remove();
            }
          };

          img.src = person.photo;
          photoWrap.appendChild(img);
        }

        // "扫到你了" 标签
        var scannedTag = document.createElement('div');
        scannedTag.className = 'card-scanned-tag';
        scannedTag.textContent = '📍 扫到我了';
        photoWrap.appendChild(scannedTag);

        card.appendChild(photoWrap);

        // 信息区
        var info = document.createElement('div');
        info.className = 'card-info';

        var nameEl = document.createElement('div');
        nameEl.className = 'card-name';
        nameEl.textContent = person.name;
        info.appendChild(nameEl);

        var descEl = document.createElement('div');
        descEl.className = 'card-desc';
        descEl.textContent = person.description || '';
        info.appendChild(descEl);

        // 标签
        var tagsEl = document.createElement('div');
        tagsEl.className = 'card-tags';
        if (person.tags && person.tags.length > 0) {
          person.tags.forEach(function(tag) {
            var tagEl = document.createElement('span');
            tagEl.className = 'card-tag';
            tagEl.textContent = tag;
            tagsEl.appendChild(tagEl);
          });
        }
        info.appendChild(tagsEl);

        card.appendChild(info);
        gallery.appendChild(card);
      });
    }

    // =============================================
    //  5. 滚动到目标人物 + 高亮动画
    // =============================================
    function scrollToPerson(targetId) {
      if (!targetId) return;

      var targetCard = document.getElementById('person-' + targetId);
      if (!targetCard) return;

      setTimeout(function() {
        targetCard.scrollIntoView({
          behavior: 'smooth',
          block: 'center',
          inline: 'nearest'
        });

        setTimeout(function() {
          targetCard.classList.add('highlight');

          setTimeout(function() {
            targetCard.classList.remove('highlight');
          }, 3800);
        }, 600);
      }, 300);
    }

    // =============================================
    //  6. 检测内容更新（用于后续访问）
    // =============================================
    function checkVersionUpdate() {
      var build = window.__BUILD__;
      var storedBuild = localStorage.getItem('gallery_build');

      if (storedBuild && parseInt(storedBuild) !== build) {
        // 页面版本已更新（用户之前看过旧版）
        var refreshBar = document.getElementById('refreshBar');
        refreshBar.classList.add('show');
        // 3 秒后自动隐藏
        setTimeout(function() {
          refreshBar.classList.remove('show');
        }, 8000);
      }

      localStorage.setItem('gallery_build', build);
    }

    // =============================================
    //  7. 主流程
    // =============================================
    function init() {
      showLoading('正在加载…');

      loadDataScript(function() {
        var data = PEOPLE_DATA;
        var targetId = getPersonIdFromURL();

        // 渲染所有卡片
        renderGallery(data, targetId);

        // 隐藏加载遮罩
        hideLoading();

        // 如果有目标人物，滚动过去
        if (targetId) {
          scrollToPerson(targetId);
        }

        // 版本更新检测
        checkVersionUpdate();
      });
    }

    // =============================================
    //  8. iOS/Android 兼容处理
    // =============================================
    function setViewportHeight() {
      var vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    setViewportHeight();
    window.addEventListener('resize', setViewportHeight);
    window.addEventListener('orientationchange', function() {
      setTimeout(setViewportHeight, 100);
    });

    // =============================================
    //  9. DOM Ready 后启动
    // =============================================
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>

</body>
</html>
