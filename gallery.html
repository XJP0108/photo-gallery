<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>照片画廊</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-overflow-scrolling:touch;overflow-x:hidden;height:100dvh}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f0f1a;color:#e8e8ec;line-height:1.6;
  min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,0);
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none
}
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,26,0.85);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  padding:12px 20px;padding-top:calc(12px + env(safe-area-inset-top,0));
  text-align:center;border-bottom:0.5px solid rgba(255,255,255,0.08)
}
.header-title{font-size:17px;font-weight:600;color:#fff}
.header-subtitle{font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px}
.header-badge{display:inline-block;background:#ff6b6b;color:#fff;font-size:11px;font-weight:600;
  padding:2px 10px;border-radius:10px;margin-left:6px;animation:badgePulse 2s ease-in-out}
@keyframes badgePulse{0%,100%{opacity:1}50%{opacity:.5}}
.gallery{max-width:600px;margin:0 auto;padding:8px 0 40px}
.card{margin:0 auto 24px;width:calc(100% - 24px);max-width:600px;
  background:#1a1a2e;border-radius:16px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.3);transition:transform .3s,box-shadow .3s}
.card:active{transform:scale(.98)}
.card.highlight{animation:cardHighlight 1.2s ease-in-out 3}
@keyframes cardHighlight{
  0%,100%{box-shadow:0 0 0 3px #ff6b6b,0 8px 40px rgba(255,107,107,.35)}
  50%{box-shadow:0 0 0 6px rgba(255,107,107,.5),0 12px 50px rgba(255,107,107,.55)}
}
.photo-wrap{position:relative;width:100%;aspect-ratio:4/5;background:#16213e;overflow:hidden}
.photo-wrap canvas{width:100%;height:100%;display:block}
.photo-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.photo-wrap img.loaded{opacity:1}
.scanned-tag{position:absolute;top:12px;right:12px;background:#ff6b6b;color:#fff;font-size:12px;
  font-weight:700;padding:4px 12px;border-radius:12px;opacity:0;transform:translateY(-8px);
  transition:all .4s cubic-bezier(.175,.885,.32,1.275)}
.card.scanned .scanned-tag{opacity:1;transform:translateY(0)}
.card-info{padding:16px}
.card-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.card-desc{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:10px;min-height:20px}
.card-desc:empty::after{content:"这个人很懒，什么都没写";color:rgba(255,255,255,.2);font-style:italic}
.card-tags{display:flex;flex-wrap:wrap;gap:8px}
.card-tag{font-size:12px;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.scroll-hint{text-align:center;padding:20px;color:rgba(255,255,255,.2);font-size:13px}
@media(min-width:640px){.gallery{padding:16px 0 40px}.card{border-radius:20px}.header{padding:16px 24px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-title" id="headerTitle">📷 照片画廊</div>
  <div class="header-subtitle" id="headerSubtitle"></div>
</header>

<main class="gallery" id="gallery"></main>

<div class="scroll-hint">继续滑动探索更多</div>

<script>
// ============================================
// ⭐ 人物数据配置 — 改这里就行！
// ============================================
var PEOPLE_DATA = [
  {id:1, name:"小明", photo:"", description:"喜欢摄影和旅行", tags:["摄影","旅行","咖啡"]},
  {id:2, name:"小红", photo:"", description:"热爱画画的设计师", tags:["设计","绘画","音乐"]},
  {id:3, name:"小刚", photo:"", description:"程序员 & 健身达人", tags:["编程","健身","阅读"]}
];

// ============================================
// 读取 URL 参数
// ============================================
function getPersonIdFromURL(){
  var m = location.search.match(/person=(\d+)/);
  return m ? parseInt(m[1],10) : null;
}

// ============================================
// Canvas 生成占位图
// ============================================
function generatePlaceholder(person){
  var c = document.createElement('canvas');
  var ctx = c.getContext('2d');
  var hue = (person.id * 137.5) % 360;
  var w = 800, h = 1000;
  c.width = w; c.height = h;

  // 背景
  ctx.fillStyle = 'hsl(' + hue + ',45%,18%)';
  ctx.fillRect(0, 0, w, h);

  // 装饰圆
  ctx.fillStyle = 'hsla(' + hue + ',50%,25%,0.4)';
  ctx.beginPath(); ctx.arc(w*.5, h*.35, w*.35, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'hsla(' + hue + ',50%,22%,0.3)';
  ctx.beginPath(); ctx.arc(w*.5, h*.35, w*.25, 0, Math.PI*2); ctx.fill();

  // 人物剪影
  ctx.fillStyle = 'hsl(' + hue + ',65%,55%)';
  ctx.beginPath(); ctx.arc(w*.5, h*.28, w*.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(w*.5, h*.55, w*.18, h*.18, 0, Math.PI, 0); ctx.fill();

  // 名字首字
  ctx.fillStyle = 'hsl(' + hue + ',30%,85%)';
  ctx.font = 'bold 72px -apple-system,"PingFang SC",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(person.name.charAt(0), w*.5, h*.78);

  // 装饰线
  ctx.fillStyle = 'hsl(' + hue + ',65%,55%)';
  ctx.fillRect(w*.35, h*.88, w*.3, 4);

  return c;
}

// ============================================
// 渲染所有卡片
// ============================================
function renderGallery(data, targetId){
  var gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  document.getElementById('headerSubtitle').textContent = '共 ' + data.length + ' 人';

  var scanned = data.filter(function(p){return p.id === targetId})[0];
  if (scanned) {
    document.getElementById('headerTitle').innerHTML =
      '📷 照片画廊 <span class="header-badge">扫到了' + scanned.name + '</span>';
  }

  data.forEach(function(person){
    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'person-' + person.id;
    if (person.id === targetId) card.classList.add('scanned');

    // 照片区
    var wrap = document.createElement('div');
    wrap.className = 'photo-wrap';

    var placeholder = generatePlaceholder(person);
    wrap.appendChild(placeholder);

    // 尝试加载真实照片
    if (person.photo) {
      var img = document.createElement('img');
      img.alt = person.name;
      img.loading = 'lazy';
      img.onload = function(){ this.classList.add('loaded'); };
      img.onerror = function(){ this.remove(); };
      img.src = person.photo;
      wrap.appendChild(img);
    }

    // "扫到我了"标签
    var tag = document.createElement('div');
    tag.className = 'scanned-tag';
    tag.textContent = '📍 扫到我了';
    wrap.appendChild(tag);
    card.appendChild(wrap);

    // 信息区
    var info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = '<div class="card-name">' + person.name + '</div>' +
      '<div class="card-desc">' + (person.description || '') + '</div>' +
      '<div class="card-tags">' +
        (person.tags || []).map(function(t){return '<span class="card-tag">'+t+'</span>'}).join('') +
      '</div>';
    card.appendChild(info);
    gallery.appendChild(card);
  });
}

// ============================================
// 滚动到目标人物 + 高亮
// ============================================
function scrollToPerson(targetId){
  if (!targetId) return;
  var card = document.getElementById('person-' + targetId);
  if (!card) return;
  setTimeout(function(){
    card.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(function(){
      card.classList.add('highlight');
      setTimeout(function(){card.classList.remove('highlight');}, 3800);
    }, 600);
  }, 300);
}

// ============================================
// 启动
// ============================================
(function(){
  var targetId = getPersonIdFromURL();
  renderGallery(PEOPLE_DATA, targetId);
  if (targetId) scrollToPerson(targetId);
})();
</script>

</body>
</html>
